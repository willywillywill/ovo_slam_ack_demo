gazebo_ros_control:
  pid_gains:
    front_right_steer_joint:
      p: 0.2
      i: 0.0
      d: 0.01

    front_left_steer_joint:
      p: 0.2
      i: 0.0
      d: 0.01

joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

front_left_steer_controller:
  type: position_controllers/JointPositionController
  joint: front_left_steer_joint

front_right_steer_controller:
  type: position_controllers/JointPositionController
  joint: front_right_steer_joint

back_left_wheel_controller:
  type: velocity_controllers/JointVelocityController
  joint: back_left_joint

back_right_wheel_controller:
  type: velocity_controllers/JointVelocityController
  joint: back_right_joint