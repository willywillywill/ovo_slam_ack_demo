services:
  ros:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: ros_noetic_ovo

    devices:
      - /dev:/dev

    environment:
      - DISPLAY=:0
      - QT_X11_NO_MITSHM=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/ros_ws
    working_dir: /ros_ws

    network_mode: host
    privileged: true
    stdin_open: true
    tty: true